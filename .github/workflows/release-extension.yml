name: Release Browser Extension

on:
  push:
    tags:
      - "ext-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ext-v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          cd browser-extension
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Package extension
        run: |
          cd browser-extension
          zip -r ../revelio-devtools-${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sign Firefox extension
        run: |
          npx web-ext sign \
            --source-dir=browser-extension \
            --api-key=${{ secrets.AMO_API_KEY }} \
            --api-secret=${{ secrets.AMO_API_SECRET }} \
            --channel=unlisted
          mv web-ext-artifacts/*.xpi revelio-devtools-${{ steps.version.outputs.version }}.xpi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Browser Extension v${{ steps.version.outputs.version }}"
          body: |
            ## Revelio Dev Tools Browser Extension

            **Installation:**
            - **Firefox:** Download the `.xpi` file and open it in Firefox (or drag it onto the browser window)
            - **Chrome:** Download the `.zip`, extract it, go to `chrome://extensions` → enable Developer Mode → "Load unpacked" → select the extracted folder
          files: |
            revelio-devtools-${{ steps.version.outputs.version }}.zip
            revelio-devtools-${{ steps.version.outputs.version }}.xpi
